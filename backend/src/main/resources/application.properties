# Server Configuration
server.port=8080
spring.application.name=synchef-backend

# ─── PostgreSQL Database ────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/SynChef}
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

# Jackson — serialize dates as ISO-8601 strings (not timestamp arrays)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# JWT Configuration
app.jwtSecret=mySecretKeyForSynChefApplicationPleaseChangeInProduction
app.jwtExpirationMs=86400000

# Spring AI OpenAI Configuration
spring.ai.openai.api-key=${OPENAI_API_KEY:your-api-key-here}
spring.ai.openai.chat.options.model=gpt-4
spring.ai.openai.chat.options.temperature=0.7

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# WebSocket Configuration
spring.websocket.allowed-origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.com.synchef=DEBUG
logging.level.org.springframework.web=INFO
